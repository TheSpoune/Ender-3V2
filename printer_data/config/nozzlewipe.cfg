[gcode_macro NOZZLE_WIPE]
gcode:
 G90
 G1 X220 Y-5.5 Z5 F18000#Move nozzle to wiper position
 G1 X220 Y-5.5 Z0 F5000 #lower to bucket
 #initiate wiping
 G1 X210 Y-9 F1000
 G1 X205 Y-4 F1000
 G1 X200 Y-9 F1000
 G1 X195 Y-4 F1000
 G1 X190 Y-9 F1000
 G1 X185 Y-4 F1000
 #finish wiping
 G1 X185 Y-4 Z5 F5000 #rise nozzle again
 #End 