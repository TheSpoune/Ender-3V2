[include macros.cfg]
[mcu CB1]
serial: /tmp/klipper_host_mcu

[temperature_sensor CB1]
sensor_type: temperature_host

[force_move]
enable_force_move: True

[exclude_object]

[mcu]
canbus_uuid: 7dd846d7a862

[danger_options]
autosave_includes: True

# This file contains common pin mappings for the BIGTREETECH Manta E3EZ
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)".

# See docs/Config_Reference.md for a description of parameters.

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 41.2
shaper_type_y = mzv
shaper_freq_y = 24.8

[autotune_tmc stepper_x]
motor: creality-42-34
#motor: moons-c17hd2024n-01n
tuning_goal: auto
[autotune_tmc stepper_y]
motor: creality-42-40
tuning_goal: auto

[autotune_tmc stepper_z]
motor: creality-42-34
#motor: moons-c17hd2024n-01n
tuning_goal: auto

[autotune_tmc extruder]
motor: moons-cse14hra1l410a
tuning_goal: auto

[mcu scanner]
canbus_uuid: 0ca8d67388c2 
#serial: /dev/serial/by-id/usb-cartographer_cartographer_
#    adjust to suit your scanner, if using usb change to serial

[scanner]
mcu: scanner            
x_offset: 0                          
y_offset: 15                         
backlash_comp: 0.5 #   Backlash compensation distance for removing Z backlash before measuring the sensor response.
sensor: cartographer
sensor_alt: carto 
mesh_runs: 2
#    Number of passes to make during mesh scan.

[bed_mesh]
zero_reference_position: 110, 110    
speed: 200
#    movement speed of toolhead during bed mesh
horizontal_move_z: 5
#    height of scanner during bed mesh scan
mesh_min: 35, 6
#    start point of bed mesh [X, Y]
mesh_max: 240, 198
#    end point of bed mesh [X, Y]
probe_count: 30, 30
algorithm: bicubic

[temperature_sensor Cartographer_MCU]
sensor_type: temperature_mcu
sensor_mcu: scanner
min_temp: 0
max_temp: 105

[safe_z_home]
home_xy_position: 110, 110
z_hop: 10

[stepper_x]
step_pin: PA14
dir_pin: !PA10
enable_pin: !PA13
microsteps: 128
rotation_distance: 20
endstop_pin: ^PC4
position_endstop: 0
position_max: 220
homing_speed: 50

[stepper_y]
step_pin: PC8
dir_pin: !PA15
enable_pin: !PC14
microsteps: 128
rotation_distance: 20
endstop_pin: ^PB0
position_endstop: -8
position_min: -8
position_max: 220
homing_speed: 50

[stepper_z]
step_pin: PD2
dir_pin: !PD4
enable_pin: !PD3
microsteps: 128
rotation_distance: 20
position_endstop: 0
endstop_pin: z_virtual_endstop
position_max: 255
position_min:-15

[heater_bed]
heater_pin: PB2 #HB
sensor_type: EPCOS 100K B57560G104F #Generic 3950
sensor_pin: PA3 #TB
#control: pid
# tuned for stock hardware with 50 degree Celsius target
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[controller_fan mcu_fan]
pin: PA8
stepper: stepper_x, stepper_y, stepper_z, stepper_z1

#[heater_fan fan1]
#pin: PB15

#[heater_fan fan2]
#pin: PB14


[printer]
kinematics: corexz
max_velocity: 200
max_accel: 3000
max_z_velocity: 50
max_z_accel: 1000

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PB8
diag_pin: PC4
run_current: 0.58
interpolate: true
stealthchop_threshold: 0
sense_resistor: 0.110
driver_SGTHRS: 255

[tmc2209 stepper_y]
uart_pin: PC9
diag_pin: PB0
run_current: 0.58
interpolate: true
stealthchop_threshold: 0
sense_resistor: 0.110
driver_SGTHRS: 255

[tmc2209 stepper_z]
uart_pin: PD0
#diag_pin: PC6
run_current: 0.58
interpolate: true
stealthchop_threshold: 0
sense_resistor: 0.110

